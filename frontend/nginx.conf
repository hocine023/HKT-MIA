server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy Airflow REST API
    location /api/v1/ {
        proxy_pass         http://airflow-webserver:8080/api/v1/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy custom MongoDB API (Airflow plugin)
    location /mongo_api/ {
        proxy_pass         http://airflow-webserver:8080/mongo_api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # SPA fallback – serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
